name: Convert YAML to LSR

on:
  workflow_dispatch: # 设置为仅支持手动触发运行

jobs:
  convert-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: legacy # 强制检出 legacy 分支

      - name: Prepare Directories
        run: |
          # 确保 Loon 文件夹存在
          mkdir -p Loon
          
      - name: Convert YAML files to LSR
        run: |
          # 检查 yaml 文件夹是否存在
          if [ ! -d "yaml" ]; then
            echo "Error: yaml directory does not exist."
            exit 1
          fi

          # 遍历 yaml 文件夹下的所有 .yaml 文件
          for file in yaml/*.yaml; do
            # 确保文件存在（防止文件夹为空时通配符失效）
            if [ -f "$file" ]; then
              # 获取不带后缀的文件名
              filename=$(basename "$file" .yaml)
              
              # 转换逻辑：
              # 1. grep 提取以 "- " 开头的行（允许前面有空格）
              # 2. sed 删除行首的空格和 "- " 字符，保留纯规则
              grep "^[[:space:]]*- " "$file" | sed 's/^[[:space:]]*- //' > "Loon/${filename}.lsr"
              
              echo "✅ Converted: $file -> Loon/${filename}.lsr"
            fi
          done

      - name: Commit and Push changes
        run: |
          # 配置 Git 机器人账户
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # 将生成的 LSR 文件添加到暂存区
          git add Loon/*.lsr
          
          # 检查是否有文件发生变动，如果有则提交并推送
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-convert .yaml to .lsr via GitHub Actions"
            git push origin legacy
            echo "🚀 Changes pushed to legacy branch successfully."
          else
            echo "✨ No new changes to commit."
          fi
