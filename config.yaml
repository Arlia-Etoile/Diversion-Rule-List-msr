# 基础配置
work_dir: "./tmp"
output_dir: "./out"

# Mihomo 配置
mihomo:
  api_url: "https://api.github.com/repos/MetaCubeX/mihomo/releases"
  start_with: "mihomo-linux-amd64-v"
  end_with: ".gz"

# Git 配置
git:
  user_email: "259484229+oom-wg[bot]@users.noreply.github.com"
  user_name: "oom-wg[bot]"
  release_branch: "release"
  max_history: 7
  timezone: "Asia/Taipei"

# 任务配置
tasks:
  AdBlock:
    format: "mrs"
    type: "domain"
    src: 
      - "https://rule.kelee.one/Clash/Advertising.yaml"
      - "https://raw.githubusercontent.com/Arlia-Etoile/Diversion-Rule-List/refs/heads/main/yaml/OtherBlock.yaml"
      - "https://rule.kelee.one/Clash/AdGuardSDNSFilter.yaml"
      - "https://rule.kelee.one/Clash/JiGuangTuiSong.yaml "
      - "https://rule.kelee.one/Clash/YouMengChuangXiang.yaml"
      
    custom_script: |
      import re
      import ipaddress
      print(f"  -> 执行自定义 AD 清洗，处理前数量: {len(domains)}")

      filtered_domains = []
      for d in domains:
          d_upper = d.upper()
          
          # 1. 将包含 IP 相关关键字直接踢出
          if "IP-CIDR" in d_upper or "IP-ASN" in d_upper or "GEOIP" in d_upper:
              continue
          
          # 2. 洗白 Classical 格式 (把 DOMAIN-SUFFIX,abc.com 变成 +.abc.com)
          if d_upper.startswith("DOMAIN-SUFFIX,"):
              parts = d.split(',')
              if len(parts) >= 2:
                  d = "+." + parts[1].strip()
          elif d_upper.startswith("DOMAIN,"):
              parts = d.split(',')
              if len(parts) >= 2:
                  d = parts[1].strip()
          elif d_upper.startswith("DOMAIN-KEYWORD,"):
              continue # domain 规则集不支持 keyword，直接忽略
              
          # 3. 兜底：处理潜伏的纯 IP 和 IPv6
          clean_d = re.sub(r'^[\+\*\.\"\']+|[\"\']+$', '', d.strip())
          is_ip = False
          try:
              ipaddress.ip_network(clean_d, strict=False)
              is_ip = True
          except ValueError:
              pass
              
          if is_ip or ':' in clean_d:
              continue
              
          filtered_domains.append(d)

      domains = filtered_domains

      # 替换与跳过逻辑
      rules_map = {
          ".xx.fbcdn.net.iberostar.com": "+.xx.fbcdn.net.iberostar.com",
          ".wns.windows.com":            "+.wns.windows.com",
          ".p2l.info":                   "+.p2l.info",
          ".wo.com.cn":                  None,  
          ".apps.iocnt.de":              "+.apps.iocnt.de" 
      }
      new_domains = []
      for d in domains:
          skip = False
          if d.startswith("+.data-") and d.endswith(".apps.iocnt.de"):
              skip = True
          if not skip:
              for suffix in rules_map:
                  if d.endswith(suffix):
                      skip = True
                      break
          if not skip:
              new_domains.append(d)

      for replacement in rules_map.values():
          if replacement:
              new_domains.append(replacement)
      domains = new_domains
      print(f"  -> 清洗完成，处理后数量: {len(domains)}")

